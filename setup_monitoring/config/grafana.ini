# Grafana Configuration
# Generated by: setup_monitoring/create_cluster_monitoring.sh
#
# Grafana Server:
#   - Port: 3000
#   - Access: http://localhost:3000
#   - Authentication: DISABLED (anonymous access enabled)

[server]
# Listen on all interfaces, port 3000
http_addr = 0.0.0.0
http_port = 3000
protocol = http

[security]
# Skip login page - auto-authenticate as admin
admin_user = admin
admin_password = admin
disable_login_form = true

[auth]
# Disable standard authentication
[auth.anonymous]
enabled = true
org_role = Admin

[auth.basic]
enabled = false

[paths]
# Data directory for Grafana
data = /var/lib/grafana

[database]
# Use SQLite for simplicity
type = sqlite3
path = /var/lib/grafana/grafana.db

[install]
# Skip welcome page
welcome_email_on_sign_up = false

[users]
# Disable user signup
allow_sign_up = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Admin

[log]
# Logging level
level = info
